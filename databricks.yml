# This is a Declarative Automation Bundle definition for databricks-treinner.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: databricks-treinner

resources:
  jobs:
    silver_sql_workflow:
      name: silver-sql-workflow-${bundle.target}
      tasks:
        - task_key: run_silver_etl_sql
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/01_sql_warehouse_serverless/02_sql_cleaning_etl.sql
          sql_warehouse_id: ${env.DATABRICKS_WAREHOUSE_ID}

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-db832d9c-35e1.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  ## Optionally, there could be 'staging' or 'prod' targets here.
  #
  # prod:
  #   workspace:
  #     host: https://dbc-db832d9c-35e1.cloud.databricks.com
